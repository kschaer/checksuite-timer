name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version_check.outputs.should_release }}
      version: ${{ steps.version_check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version was bumped
        id: version_check
        run: |
          # Get version from package.json
          PACKAGE_VERSION=$(jq -r .version package.json)
          echo "Package version: $PACKAGE_VERSION"

          # Get latest git tag (if any)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          echo "Latest tag version: $LATEST_VERSION"

          # Compare versions
          if [ "$PACKAGE_VERSION" != "$LATEST_VERSION" ]; then
            echo "Version was bumped from $LATEST_VERSION to $PACKAGE_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Verify dist is committed
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "Error: dist/ has uncommitted changes. Please commit the built files."
            exit 1
          fi

      - name: Create and push tag
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          release_name: Release v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false

      - name: Update major version tag
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          MAJOR_VERSION=$(echo $VERSION | cut -d. -f1)
          git tag -fa "v$MAJOR_VERSION" -m "Release v$VERSION"
          git push origin "v$MAJOR_VERSION" --force
