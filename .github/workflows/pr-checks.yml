name: PR Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  # Quick validation job
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Quick validation
        run: |
          echo "🔍 Running quick validation checks..."
          sleep 5
          yarn lint
          
  # Unit tests with multiple node versions
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Run tests
        run: |
          echo "🧪 Running tests on Node ${{ matrix.node-version }}..."
          sleep 10
          yarn test
          
  # TypeScript compilation check
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: TypeScript compilation
        run: |
          echo "🔧 Checking TypeScript compilation..."
          sleep 8
          npx tsc --noEmit
          
  # Build and package
  build:
    runs-on: ubuntu-latest
    needs: [validate, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Build action
        run: |
          echo "🏗️ Building action..."
          sleep 12
          yarn build
          
      - name: Verify build
        run: |
          echo "✅ Verifying build output..."
          sleep 3
          if [ ! -f "dist/index.js" ]; then
            echo "❌ Build failed - no output file"
            exit 1
          fi
          echo "✅ Build verification complete"
          
  # Security audit
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Security audit
        run: |
          echo "🔒 Running security audit..."
          sleep 7
          yarn audit --level moderate || true
          
  # Integration test
  integration:
    runs-on: ubuntu-latest
    needs: [test, build]
    permissions:
      contents: read
      actions: read
      checks: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install and build
        run: |
          yarn install --frozen-lockfile
          yarn build
          
      - name: Test action locally
        id: test-action
        uses: ./
        with:
          branch: 'main'
          time_window: '7d'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Validate action output
        run: |
          echo "🧪 Integration test results:"
          echo "├─ Commits: ${{ steps.test-action.outputs.commit_count }}"
          echo "├─ Checksuites: ${{ steps.test-action.outputs.total_checksuites }}"
          echo "└─ Average duration: ${{ steps.test-action.outputs.avg_duration_seconds }}s"