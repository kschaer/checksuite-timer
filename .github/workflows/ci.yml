name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Run linting
        run: yarn lint
        
      - name: Check formatting
        run: yarn format-check
        
      - name: Run tests
        run: yarn test
        
      - name: Build
        run: yarn build
        
      - name: Check dist is up to date
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi
          
  # Integration test using the action (only on main branch pushes to avoid conflicts)
  test-action:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: read
      checks: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install and build
        run: |
          yarn install --frozen-lockfile
          yarn build
        
      - name: Test action with short time window
        id: test-short
        uses: ./
        with:
          branch: 'main'
          time_window: '1h'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Display short window results
        run: |
          echo "🕐 1-hour window results:"
          echo "├─ Commits: ${{ steps.test-short.outputs.commit_count }}"
          echo "└─ Total checksuites: ${{ steps.test-short.outputs.total_checksuites }}"
          
      - name: Test action with longer time window  
        id: test-long
        uses: ./
        with:
          branch: 'main'
          time_window: '7d'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Display long window results
        run: |
          echo "📅 7-day window results:"
          echo "├─ Commits: ${{ steps.test-long.outputs.commit_count }}"
          echo "├─ Average duration: ${{ steps.test-long.outputs.avg_duration_seconds }}s"
          echo "└─ Total checksuites: ${{ steps.test-long.outputs.total_checksuites }}"
          
          if [ "${{ steps.test-long.outputs.commit_count }}" != "0" ]; then
            echo ""
            echo "📊 Detailed analysis:"
            echo '${{ steps.test-long.outputs.commits_data }}' | jq -r '.commits[] | "├─ \(.commit.sha[0:7]): \(.duration_seconds)s, \(.stats.total) checksuites"' | head -5
          fi

  # Simulate some different types of jobs that would create different check suites
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Simulate linting
        run: |
          echo "Running lint checks..."
          sleep 10
          echo "Lint completed"

  test-job:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Simulate tests
        run: |
          echo "Running tests on Node ${{ matrix.node-version }}..."
          sleep 15
          echo "Tests completed"

  build-job:
    runs-on: ubuntu-latest
    needs: [lint-job, test-job]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Simulate build
        run: |
          echo "Building application..."
          sleep 20
          echo "Build completed"