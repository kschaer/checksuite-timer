# Example workflow for testing the checksuite-timer action in this repository
name: Test Checksuite Timer Action

on:
  schedule:
    # Run daily at 9 AM UTC to track deploy times
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering for testing

permissions:
  contents: read
  actions: read

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Test local action
        id: test-action
        uses: ./
        with:
          branch: 'main'
          time_window: '24h'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Display results
        run: |
          echo "Commits analyzed: ${{ steps.test-action.outputs.commit_count }}"
          echo "Average duration: ${{ steps.test-action.outputs.avg_duration_seconds }} seconds"
          echo "Total checksuites: ${{ steps.test-action.outputs.total_checksuites }}"
          
      - name: Display detailed commit analysis
        run: |
          echo "=== Per-Commit Analysis ==="
          echo '${{ steps.test-action.outputs.commits_data }}' | jq -r '.commits[] | "Commit \(.commit.sha) by \(.commit.committer_email): \(.duration_seconds)s duration, \(.stats.total) checksuites (\(.stats.successful) successful, \(.stats.failed) failed)"'
          
          echo ""
          echo "=== Summary ==="
          echo '${{ steps.test-action.outputs.commits_data }}' | jq -r '"Total: \(.summary.total_commits) commits, \(.summary.successful_commits) fully successful, \(.summary.failed_commits) with failures"'