name: 'Check Suite Timer'
description: 'Track the duration of GitHub Actions checksuites for commits to calculate deploy timing'
author: 'Your Name'

inputs:
  branch:
    description: 'The branch to analyze for commits'
    required: false
    default: 'main'
  time_window:
    description: 'Time window to look back for commits (e.g., 24h, 12h, 30m)'
    required: false
    default: '24h'
  github_token:
    description: 'GitHub token with appropriate permissions (contents:read, actions:read)'
    required: true
    default: ${{ github.token }}
  cortex_api_key:
    description: 'Cortex API key for posting deploy events (optional - if not provided, Cortex integration is skipped)'
    required: false
  cortex_entity_id:
    description: 'Cortex entity tag or ID to associate deploys with'
    required: false
  cortex_environment:
    description: 'Environment name for the deploy (e.g., production, staging)'
    required: false
    default: 'production'
  cortex_deploy_title_template:
    description: 'Template for deploy title (supports {sha}, {branch}, {email})'
    required: false
    default: 'Deploy {sha} to {branch}'
  cortex_post_per_commit:
    description: 'Whether to post one deploy per commit (true) or skip on failures (false)'
    required: false
    default: 'true'

outputs:
  commits_data:
    description: 'JSON object with per-commit analysis including duration, checksuites, and summary stats'
  commit_count:
    description: 'Number of commits analyzed'
  total_checksuites:
    description: 'Total number of checksuites across all commits'
  avg_duration_seconds:
    description: 'Average duration across all commits in seconds'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'clock'
  color: 'blue'